<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tap & Earn</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  margin: 0;
  padding: 20px;
}
h1, h2 { margin-bottom: 10px; }
.section { margin-top: 20px; padding: 15px; background: #111; border-radius: 10px; }

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 15px;
  border-radius: 8px;
  background: #007bff;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  text-align: center;
}

.btn:active { transform: scale(0.95); }

.hidden { display: none; }

input, select {
  padding: 8px;
  margin: 5px 0;
  width: 100%;
  border-radius: 5px;
  border: none;
}

#joinPopup {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  padding:20px;
  z-index:9999;
}

#wheelContainer{
  margin-top:20px;
  text-align:center;
}

#wheel{
  width:200px;
  height:200px;
  margin:0 auto;
  border:5px solid #007bff;
  border-radius:50%;
  background:conic-gradient(#007bff 0deg 60deg,#111 60deg 120deg,#007bff 120deg 180deg,#111 180deg 240deg,#007bff 240deg 300deg,#111 300deg 360deg);
  transition:transform 3s cubic-bezier(0.33,1,0.68,1);
}

#successBox{
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
background:#007bff;
padding:20px;
border-radius:10px;
font-size:18px;
display:none;
z-index:9999;
}
</style>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
</head>

<body>

<div id="successBox">
🎉 You're successful receive 1000 energy
</div>

<div id="joinPopup">
<h2>📢 Join Our Telegram Channel to Continue</h2>
<button onclick="joinChannelClicked()">👉 Join @earnzoners</button>
</div>

<div id="mainPage" style="display:none;">

<h1>⚡ Real Tap & Earn</h1>

<div id="wheelContainer">
<div id="wheel"></div>
<div class="btn" id="wheelBtn">🎡 Spin Wheel</div>
</div>

<div class="section">
<h2>📋 Tasks</h2>

<div id="adsgram-container" class="hidden"></div>

</div>

<div class="section">
<h2>💳 Withdraw</h2>

<select id="method">
<option value="Litecoin">Litecoin</option>
<option value="USDT">USDT</option>
<option value="Payeer">Payeer</option>
<option value="Bank">Bank</option>
</select>

<input type="text" id="address" placeholder="Enter wallet"/>

<input type="number" id="amount" placeholder="Minimum 50000"/>

<div class="btn" id="withdrawBtn">Request Withdraw</div>

</div>

<div class="section">

<h2>👥 Referral Program</h2>

<input type="text" id="refLink" readonly/>

<div class="btn" id="copyRefBtn">Copy Link</div>

</div>

</div>

<script>

const webApp=Telegram.WebApp;

let points=parseInt(localStorage.getItem("points")||0);

let energy=parseInt(localStorage.getItem("energy")||0);

let completedTasks=0;

function joinChannelClicked(){

window.open("https://t.me/crytocurrentupdate","_blank");

document.getElementById("joinPopup").style.display="none";

document.getElementById("mainPage").style.display="block";

}

function showJoinPopupAfterAds(){

try{

const rewardAd=window.Adsgram.init({blockId:"21545"});

rewardAd.show().finally(()=>{

document.getElementById("joinPopup").style.display="flex";

});

}catch(e){

document.getElementById("joinPopup").style.display="flex";

}

}

const wheel=document.getElementById("wheel");

const wheelBtn=document.getElementById("wheelBtn");

const tapSound=new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");

const taskIds=["task-21546","task-21547","task-21548","task-21549","task-21550","task-21551"];

wheelBtn.addEventListener("click",()=>{

const randomDeg=Math.floor(Math.random()*360)+720;

wheel.style.transform=`rotate(${randomDeg}deg)`;

tapSound.play();

setTimeout(()=>{

startRandomTask();

},3000);

});

function startRandomTask(){

const randomTask=taskIds[Math.floor(Math.random()*taskIds.length)];

const container=document.getElementById("adsgram-container");

container.innerHTML=`<adsgram-task class="task" data-block-id="${randomTask}"></adsgram-task>`;

container.classList.remove("hidden");

const task=container.querySelector(".task");

task.addEventListener("reward",()=>{

points+=Math.floor(Math.random()*5)+1;

localStorage.setItem("points",points);

completedTasks++;

if(completedTasks>=10){

energy+=1000;

localStorage.setItem("energy",energy);

completedTasks=0;

showSuccessMessage();

}else{

startRandomTask();

}

});

}

function showSuccessMessage(){

const box=document.getElementById("successBox");

box.style.display="block";

setTimeout(()=>{

box.style.display="none";

},30000);

}

document.getElementById("withdrawBtn").addEventListener("click",()=>{

const method=document.getElementById("method").value;

const address=document.getElementById("address").value;

const amount=parseInt(document.getElementById("amount").value);

if(isNaN(amount)||amount<50000){

alert("Minimum withdrawal is 50000");

return;

}

if(points<amount){

alert("Not enough points");

return;

}

const user=webApp.initDataUnsafe.user||{};

const msg=JSON.stringify({

type:"withdraw_request",

user_id:user.id,

username:user.username||"No username",

amount,method,address

});

Telegram.WebApp.sendData(msg);

points-=amount;

localStorage.setItem("points",points);

alert("Withdrawal request sent");

});

const user=webApp.initDataUnsafe.user||{};

const userId=user.id||"guest";

document.getElementById("refLink").value=`https://t.me/Tapancebot?start=${userId}`;

document.getElementById("copyRefBtn").addEventListener("click",()=>{

const refInput=document.getElementById("refLink");

refInput.select();

document.execCommand("copy");

});

document.addEventListener("DOMContentLoaded",()=>{

showJoinPopupAfterAds();

});

</script>

</body>
</html>
